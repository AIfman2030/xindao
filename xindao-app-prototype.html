<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心岛 - 释放你的焦虑与孤独</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: linear-gradient(135deg, #fef6f0 0%, #fdf2eb 50%, #f8e8dc 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    h1 {
      text-align: center;
      font-family: 'Noto Serif SC', serif;
      font-size: 28px;
      color: #5a4a42;
      margin-bottom: 8px;
      letter-spacing: 0.1em;
    }
    .subtitle {
      text-align: center;
      color: #8b7355;
      font-size: 14px;
      margin-bottom: 40px;
      font-weight: 300;
    }
    .phones-container {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      justify-content: center;
      max-width: 1400px;
      margin: 0 auto;
    }
    .phone-label {
      text-align: center;
      margin-bottom: 12px;
      font-size: 13px;
      color: #8b7355;
      font-style: italic;
    }
    .phone-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>
  <h1>心岛</h1>
  <p class="subtitle">释放你的焦虑与孤独</p>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ============ iOS Frame Component ============
    const iosFrameStyles = {
      wrapper: {
        display: 'inline-block',
        padding: 12,
        background: '#000',
        borderRadius: 60,
        boxShadow: '0 0 0 2px #1f2937, 0 20px 60px rgba(0,0,0,0.25)',
        position: 'relative',
      },
      screen: {
        position: 'relative',
        borderRadius: 48,
        overflow: 'hidden',
        background: '#fff',
      },
      statusBar: {
        position: 'absolute',
        top: 0,
        left: 0,
        right: 0,
        height: 54,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'space-between',
        padding: '0 32px 0 32px',
        fontSize: 16,
        fontWeight: 600,
        fontFamily: '-apple-system, "SF Pro Text", sans-serif',
        zIndex: 20,
        pointerEvents: 'none',
      },
      dynamicIsland: {
        position: 'absolute',
        top: 12,
        left: '50%',
        transform: 'translateX(-50%)',
        width: 124,
        height: 36,
        background: '#000',
        borderRadius: 999,
        zIndex: 30,
      },
      content: {
        position: 'absolute',
        top: 54,
        left: 0,
        right: 0,
        bottom: 34,
        overflow: 'hidden',
      },
      homeIndicator: {
        position: 'absolute',
        bottom: 10,
        left: '50%',
        transform: 'translateX(-50%)',
        width: 140,
        height: 5,
        background: 'rgba(0,0,0,0.25)',
        borderRadius: 999,
        zIndex: 10,
      },
    };

    function IosFrame({ time = "9:41", battery = 85, darkMode = false, children }) {
      const textColor = darkMode ? '#fff' : '#000';
      return (
        <div style={iosFrameStyles.wrapper}>
          <div style={{ ...iosFrameStyles.screen, width: 393, height: 852, background: darkMode ? '#000' : '#fff' }}>
            <div style={{ ...iosFrameStyles.statusBar, color: textColor }}>
              <span>{time}</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ display: 'flex', alignItems: 'flex-end', gap: 2, height: 12 }}>
                  {[4, 6, 9, 11].map((h, i) => (
                    <div key={i} style={{ width: 3, height: h, background: 'currentColor', borderRadius: 1 }} />
                  ))}
                </div>
                <svg width="16" height="12" viewBox="0 0 16 12" fill="none" style={{ color: textColor }}>
                  <path d="M8 11.5a1 1 0 100-2 1 1 0 000 2z" fill="currentColor" />
                  <path d="M3 7.5a7 7 0 0110 0" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round" />
                </svg>
                <div style={{ width: 26, height: 12, border: '1.5px solid currentColor', borderRadius: 3, padding: 1, position: 'relative', opacity: 0.9 }}>
                  <div style={{ width: `${battery}%`, height: '100%', background: 'currentColor', borderRadius: 1 }} />
                </div>
              </div>
            </div>
            <div style={iosFrameStyles.dynamicIsland} />
            <div style={iosFrameStyles.content}>{children}</div>
            <div style={iosFrameStyles.homeIndicator} />
          </div>
        </div>
      );
    }

    // ============ App Screens ============

    // Screen 1: Splash/Welcome
    function SplashScreen() {
      return (
        <div style={{
          height: '100%',
          background: 'linear-gradient(180deg, #FFF8F3 0%, #FFE8D6 100%)',
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          justifyContent: 'center',
          padding: '40px 32px',
        }}>
          {/* Island Icon */}
          <div style={{
            width: 120,
            height: 120,
            borderRadius: '50%',
            background: 'linear-gradient(135deg, #FF9A76 0%, #FF7E5F 100%)',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            marginBottom: 32,
            boxShadow: '0 20px 60px rgba(255,126,95,0.3)',
          }}>
            <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
              <path d="M30 10C30 10 20 18 20 28C20 38 30 45 30 45C30 45 40 38 40 28C40 18 30 10 30 10Z" fill="#FFF" fillOpacity="0.9"/>
              <path d="M25 50C25 50 15 48 12 52C12 52 18 56 25 54" fill="#FFF" fillOpacity="0.6"/>
              <path d="M35 50C35 50 45 48 48 52C48 52 42 56 35 54" fill="#FFF" fillOpacity="0.6"/>
            </svg>
          </div>

          <h2 style={{
            fontFamily: 'Noto Serif SC, serif',
            fontSize: 36,
            color: '#5D4E45',
            marginBottom: 12,
            letterSpacing: '0.15em',
          }}>心岛</h2>

          <p style={{
            color: '#8B7B6B',
            fontSize: 15,
            textAlign: 'center',
            lineHeight: 1.8,
            marginBottom: 48,
          }}>
            在这里，你不再孤独<br/>
            释放焦虑，遇见智者的温暖陪伴
          </p>

          <button style={{
            width: '100%',
            padding: '16px 32px',
            background: 'linear-gradient(135deg, #FF9A76 0%, #FF7E5F 100%)',
            border: 'none',
            borderRadius: 25,
            color: '#FFF',
            fontSize: 17,
            fontWeight: 600,
            cursor: 'pointer',
            marginBottom: 16,
            boxShadow: '0 8px 24px rgba(255,126,95,0.35)',
          }}>
            开始探索
          </button>

          <button style={{
            padding: '12px 24px',
            background: 'transparent',
            border: 'none',
            color: '#8B7B6B',
            fontSize: 15,
            cursor: 'pointer',
          }}>
            已有账号？登录
          </button>
        </div>
      );
    }

    // Screen 2: Registration
    function RegisterScreen() {
      const [nickname, setNickname] = useState('');
      return (
        <div style={{
          height: '100%',
          background: '#FFF8F3',
          padding: '24px 24px',
        }}>
          <div style={{ textAlign: 'center', marginBottom: 40 }}>
            <div style={{
              width: 80,
              height: 80,
              borderRadius: '50%',
              background: 'linear-gradient(135deg, #FF9A76 0%, #FF7E5F 100%)',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              margin: '0 auto 20px',
            }}>
              <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                <path d="M20 8C20 8 13 14 13 20C13 26 20 31 20 31C20 31 27 26 27 20C27 14 20 8 20 8Z" fill="#FFF"/>
              </svg>
            </div>
            <h2 style={{ fontSize: 24, color: '#5D4E45', marginBottom: 8 }}>欢迎来到心岛</h2>
            <p style={{ color: '#8B7B6B', fontSize: 14 }}>给自己起个温暖的名字吧</p>
          </div>

          <input
            type="text"
            placeholder="输入你的昵称"
            value={nickname}
            onChange={(e) => setNickname(e.target.value)}
            style={{
              width: '100%',
              padding: '18px 20px',
              fontSize: 17,
              border: '2px solid #F0E6DE',
              borderRadius: 16,
              background: '#FFF',
              outline: 'none',
              marginBottom: 24,
              transition: 'border-color 0.2s',
            }}
            onFocus={(e) => e.target.style.borderColor = '#FF9A76'}
            onBlur={(e) => e.target.style.borderColor = '#F0E6DE'}
          />

          <div style={{
            background: '#FFF5EE',
            borderRadius: 16,
            padding: 20,
            marginBottom: 24,
          }}>
            <h3 style={{ fontSize: 15, color: '#5D4E45', marginBottom: 12 }}>🌴 你将加入一个温暖的群组</h3>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
              {['Naval（生活智者）', '保罗·格雷厄姆（职场顾问）', '费曼（学习导师）', '张一鸣（产品大师）', 'MrBeast（娱乐顾问）'].map(name => (
                <span key={name} style={{
                  background: '#FFE8D6',
                  color: '#8B5A3C',
                  padding: '6px 12px',
                  borderRadius: 20,
                  fontSize: 13,
                }}>{name}</span>
              ))}
            </div>
          </div>

          <button style={{
            width: '100%',
            padding: '16px',
            background: nickname ? 'linear-gradient(135deg, #FF9A76 0%, #FF7E5F 100%)' : '#E0D5CC',
            border: 'none',
            borderRadius: 25,
            color: '#FFF',
            fontSize: 17,
            fontWeight: 600,
            cursor: nickname ? 'pointer' : 'not-allowed',
            boxShadow: nickname ? '0 8px 24px rgba(255,126,95,0.35)' : 'none',
          }}>
            进入心岛
          </button>
        </div>
      );
    }

    // Screen 3: Main Chat - Daily Quote
    function MainChatQuote() {
      return (
        <div style={{
          height: '100%',
          background: 'linear-gradient(180deg, #FFFBF8 0%, #FFF5EE 100%)',

            padding: '16px 20px',
            background: '#FFF',
            borderBottom: '1px solid #F5EDE6',

            alignItems: 'center',
            justifyContent: 'space-between',

          {/* Chat Messages */}
          <div style={{ flex: 1, overflow: 'auto', padding: '16px 16px 8px' }}>

            {/* Admin Quote Card */}
            <div style={{
              background: 'linear-gradient(135deg, #FF9A76 0%, #FF7E5F 100%)',
              borderRadius: 20,
              padding: '20px 20px 16px',
              marginBottom: 20,
              boxShadow: '0 8px 24px rgba(255,126,95,0.25)',
            }}>
              <div style={{ display: 'flex', alignItems: 'center', marginBottom: 12 }}>
                <div style={{
                  width: 36,
                  height: 36,
                  borderRadius: '50%',
                  background: '#FFF',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  marginRight: 10,
                }}>
                  <span style={{ fontSize: 18 }}>🏝️</span>
                </div>
                <div>
                  <p style={{ color: '#FFF', fontWeight: 600, fontSize: 14 }}>群主</p>
                  <p style={{ color: 'rgba(255,255,255,0.7)', fontSize: 11 }}>每天 09:00</p>
                </div>
              </div>
              <p style={{
                color: '#FFF',
                fontSize: 16,
                lineHeight: 1.7,
                fontFamily: 'Noto Serif SC, serif',
              }}>
                「不必急着得到所有答案。<br/>
                有些路，走着走着就清晰了。」<br/>
                <span style={{ fontSize: 13, opacity: 0.8 }}>—— 今日能量句</span>
              </p>
            </div>

            {/* Welcome Message */}
            <div style={{ display: 'flex', marginBottom: 16 }}>
              <div style={{
                width: 36,
                height: 36,
                borderRadius: '50%',
                background: 'linear-gradient(135deg, #FFD4C4 0%, #FFBDA8 100%)',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                marginRight: 10,
                flexShrink: 0,
              }}>
                <span style={{ fontSize: 16 }}>🏝️</span>
              </div>
              <div style={{ maxWidth: '75%' }}>
                <p style={{ fontSize: 12, color: '#8B7B6B', marginBottom: 4 }}>群主</p>
                <div style={{
                  background: '#FFF',
                  borderRadius: '4px 16px 16px 16px',
                  padding: '12px 16px',
                  boxShadow: '0 2px 8px rgba(0,0,0,0.04)',
                }}>
                  <p style={{ fontSize: 15, color: '#5D4E45', lineHeight: 1.6 }}>
                    Hi <span style={{ color: '#FF7E5F', fontWeight: 600 }}>小明</span>, 我是这个群的主理人，全力保障你的生活 / 工作 / 感情 ✨
                  </p>
                </div>
              </div>
            </div>

            {/* Mentions Introduction */}
            <div style={{ display: 'flex', marginBottom: 16 }}>
              <div style={{ width: 36, marginRight: 10, flexShrink: 0 }} />
              <div style={{ maxWidth: '75%' }}>
                <p style={{ fontSize: 13, color: '#5D4E45', lineHeight: 1.6, background: '#FFF5EE', padding: '12px 16px', borderRadius: 16 }}>
                  我们团队里还有
                  <span style={{ color: '#FF7E5F', fontWeight: 500 }}>@Naval</span>
                  <span style={{ color: '#8B7B6B' }}>、</span>
                  <span style={{ color: '#6B8E9F', fontWeight: 500 }}>@保罗·格雷厄姆</span>
                  <span style={{ color: '#8B7B6B' }}>、</span>
                  <span style={{ color: '#9B8AA8', fontWeight: 500 }}>@费曼</span>
                  <span style={{ color: '#8B7B6B' }}>、</span>
                  <span style={{ color: '#7B9E8B', fontWeight: 500 }}>@张一鸣</span>
                  <span style={{ color: '#8B7B6B' }}>、</span>
                  <span style={{ color: '#C49B6A', fontWeight: 500 }}>@MrBeast</span>
                  <br/>有什么问题可以直接@他们来给你解答 🙏
                </p>
              </div>
            </div>

            {/* Member avatars hint */}
            <div style={{
              display: 'flex',
              gap: 8,
              marginLeft: 46,
              marginBottom: 20,
            }}>
              <div style={{ width: 24, height: 24, borderRadius: '50%', background: '#FFE4D6' }} />
              <div style={{ width: 24, height: 24, borderRadius: '50%', background: '#D6E8F0' }} />
              <div style={{ width: 24, height: 24, borderRadius: '50%', background: '#E8DFF0' }} />
              <div style={{ width: 24, height: 24, borderRadius: '50%', background: '#DFF0E8' }} />
              <div style={{ width: 24, height: 24, borderRadius: '50%', background: '#F0EBD6' }} />
              <span style={{ fontSize: 12, color: '#8B7B6B', alignSelf: 'center', marginLeft: 4 }}>+99 在岛上</span>
            </div>

          </div>

          {/* Mentions Panel */}
          <div style={{
            background: '#FFF',
            borderTop: '1px solid #F5EDE6',
            padding: '12px 16px 34px',
          }}>
            <p style={{ fontSize: 12, color: '#8B7B6B', marginBottom: 8, textAlign: 'center' }}>点击@呼唤智者们</p>
            <div style={{ display: 'flex', gap: 8, overflowX: 'auto', paddingBottom: 4 }}>
              {[
                { name: '群主', color: '#FFD4C4', emoji: '🏝️' },
                { name: '@Naval', color: '#FFE4D6', emoji: '🌊' },
                { name: '@PG', color: '#D6E8F0', emoji: '💼' },
                { name: '@费曼', color: '#E8DFF0', emoji: '🔬' },
                { name: '@张一鸣', color: '#DFF0E8', emoji: '📱' },

                <div key={m.name} style={{
                  padding: '8px 14px',

                  fontSize: 13,
                  fontWeight: 500,
                  color: '#5D4E45',

          </div>

    // Screen 4: User Asks Question
    function ChatAsking() {
      return (
        <div style={{
          height: '100%',
          background: 'linear-gradient(180deg, #FFFBF8 0%, #FFF5EE 100%)',
          display: 'flex',
          flexDirection: 'column',
        }}>
          {/* Header */}
          <div style={{
            padding: '16px 20px',
            background: '#FFF',
            borderBottom: '1px solid #F5EDE6',
            display: 'flex',
            alignItems: 'center',
            gap: 12,
          }}>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8B7B6B" strokeWidth="2">
              <path d="M15 18l-6-6 6-6"/>

            <h2 style={{ fontSize: 17, color: '#5D4E45', fontWeight: 600 }}>正在咨询 @Naval</h2>
          </div>

          {/* Chat Messages */}
          <div style={{ flex: 1, overflow: 'auto', padding: '16px 16px 8px' }}>

                <div style={{
                  background: 'linear-gradient(135deg, #FF9A76 0%, #FF7E5F 100%)',
                  borderRadius: '16px 4px 16px 16px',
                  padding: '12px 16px',

                  </p>
                </div>
              </div>
            </div>

            {/* Naval Response */}
            <div style={{ display: 'flex', marginBottom: 16 }}>
              <div style={{
                width: 36,
                height: 36,
                borderRadius: '50%',
                background: 'linear-gradient(135deg, #FFE4D6 0%, #FFD4C4 100%)',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                marginRight: 10,
                flexShrink: 0,
              }}>
                <span style={{ fontSize: 16 }}>🌊</span>
              </div>
              <div style={{ maxWidth: '78%' }}>
                <p style={{ fontSize: 12, color: '#8B7B6B', marginBottom: 4 }}>@Naval</p>

                  borderRadius: '4px 16px 16px 16px',

    // Screen 5: Multi-person Response
    function ChatMultiResponse() {
      return (
